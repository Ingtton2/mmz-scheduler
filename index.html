<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메밀집 실시간 스케줄 관리 시스템</title>
<style>
:root{
  --br8:#5C3A12;--br7:#7B5222;--br6:#96631A;--br5:#B87B30;
  --br2:#E8D5B8;--br1:#F5ECD8;--br0:#FBF7EF;
  --gr7:#2D6040;--gr6:#3E7A50;--gr1:#D4EDE0;
  --re6:#C0392B;--re1:#FDECEA;
  --bl6:#2563EB;--bl1:#DBEAFE;
  --txt:#2D1A06;--txt2:#6B5840;--txt3:#9C836A;
  --bdr:#E5D5C0;--bdr2:#F0E6D8;
  --card:#FFFFFF;--bg:#FBF7EF;
  --sh:0 1px 4px rgba(92,58,18,.09);
  --sh2:0 3px 12px rgba(92,58,18,.13);
  --r4:4px;--r6:6px;--r10:10px;--r14:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',-apple-system,'Noto Sans KR',system-ui,sans-serif;font-size:14px;color:var(--txt);background:var(--bg)}

.app{min-height:100vh;display:flex;flex-direction:column}
.app-header{
  background:#fff;border-bottom:1.5px solid var(--bdr);padding:10px 16px;
  display:flex;align-items:center;gap:10px;box-shadow:var(--sh);position:sticky;top:0;z-index:20;
}
.header-text{display:flex;flex-direction:column;justify-content:center;}
.header-title{font-size:16px;font-weight:700;color:var(--br7);letter-spacing:-.3px;line-height:1.2}
.header-sub{font-size:10px;color:var(--txt3);margin-top:1px}

.tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--bdr);position:sticky;top:57px;z-index:15}
.tab{flex:1;padding:11px 4px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--txt3);border-bottom:2.5px solid transparent;transition:.15s;}
.tab:hover{color:var(--br6)}
.tab.active{color:var(--br7);border-bottom-color:var(--br7)}

.content{padding:14px;flex:1}
.section-title{font-size:14px;font-weight:600;margin:15px 0 8px 0;color:var(--br7);display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:4px;height:12px;background:var(--br5);border-radius:2px}

.btn{
  padding:7px 14px;border-radius:var(--r6);border:1px solid var(--bdr);
  background:var(--card);cursor:pointer;font-size:13px;font-weight:500;
  color:var(--txt);transition:.14s;line-height:1.4;
}
.btn:hover{background:var(--br0);border-color:var(--br2)}
.btn-primary{background:var(--br7);color:#fff;border-color:var(--br7)}
.btn-primary:hover{background:var(--br8);border-color:var(--br8)}
.btn-sm{padding:4px 10px;font-size:12px}

.card{background:var(--card);border-radius:var(--r10);border:1px solid var(--bdr2);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.flex{display:flex}.gap-4{gap:4px}.gap-8{gap:8px}.ai-c{align-items:center}.jc-sb{justify-content:space-between}.flex-wrap{flex-wrap:wrap}.w100{width:100%}

input,select,textarea{
  font-size:13px;padding:7px 10px;border-radius:var(--r6);
  border:1px solid var(--bdr);background:#FAFAF8;color:var(--txt);outline:none;
}
input:focus,select:focus{border-color:var(--br5)}

.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pos-hall{background:#E0F2FE;color:#0369A1}
.pos-kitchen{background:#FEF3C7;color:#B45309}
.lvl-A{background:#FCE7F3;color:#BE185D}
.lvl-B{background:#E0F2FE;color:#0369A1}
.lvl-C{background:#F3F4F6;color:#374151}

.shift-O {background:#DDEEFF;color:#1A4F8A}          
.shift-M {background:#E8E0F8;color:#4A2D9E}          
.shift-C {background:#F8E0ED;color:#8B1A55}          
.shift-HO{background:#D4EDE0;color:#1E6644}          
.shift-HC{background:#FAECC0;color:#7A5200}          
.shift-FM{background:#FAD8D8;color:#8B1A1A}          
.shift-PP{background:#EEE0FA;color:#5A1A8B}          
.shift-DO{background:#EDE8DF;color:#8B7355}          
.shift-YC{background:#FBF0B0;color:#5C3A00}          
.shift-KH{background:#D8EEF8;color:#0A4A7A}          
.shift-TH{background:#F8E0EC;color:#8B1A50}          

.sched-table{border-collapse:collapse;font-size:12px;min-width:700px;width:100%}
.sched-table th,.sched-table td{border:1px solid #EEE8DF;padding:5px 6px;text-align:center;white-space:nowrap}
.sched-table th{background:#F7F2EA;font-weight:600;position:sticky;top:0;z-index:2;color:var(--txt2)}
.sched-table .col-name{position:sticky;left:0;z-index:3;background:#F7F2EA;font-weight:600;min-width:80px;color:var(--txt);text-align:left}
.sched-table td.col-name{background:#FDFAF6;font-weight:500}
.sched-table .row-boss{background:#FFF9F0}
.cell-btn{width:100%;min-width:44px;border:none;cursor:pointer;font-size:11px;font-weight:600;padding:3px 6px;border-radius:20px;white-space:nowrap;transition:filter .1s;}
.cell-btn:hover{filter:brightness(.88);}
.tbl-wrap{overflow-x:auto;border-radius:var(--r10);border:1px solid var(--bdr);box-shadow:var(--sh);margin-bottom:15px}

.warn-box{border-radius:var(--r6);border:1px solid #F5C6C2;background:var(--re1);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--re6)}
.warn-box li{margin-left:16px;margin-top:3px}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
.cal-day-head{text-align:center;font-size:11px;font-weight:600;color:var(--txt3);padding:4px}
.cal-day{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r6);padding:6px;min-height:95px;font-size:11px;cursor:pointer;}
.cal-day .cal-date{font-weight:600;font-size:12px;margin-bottom:4px;color:var(--txt)}
.cal-day.sunday .cal-date{color:#DC2626}
.cal-day.saturday .cal-date{color:var(--bl6)}
.cal-day .cal-entry{display:flex;justify-content:space-between;margin-bottom:2px;gap:3px;align-items:center}
.cal-day .cal-name{color:var(--txt3);font-size:10px;flex-shrink:0}

.stat-table{width:100%;border-collapse:collapse;font-size:12px}
.stat-table th,.stat-table td{border:1px solid #EEE8DF;padding:7px 8px;text-align:center}
.stat-table th{background:#F7F2EA;font-weight:600;color:var(--txt2)}

.modal-overlay{position:fixed;inset:0;background:rgba(45,26,6,.48);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--r14);border:1px solid var(--bdr);padding:20px;min-width:280px;max-width:380px;width:92%;max-height:88vh;overflow-y:auto;box-shadow:0 10px 40px rgba(92,58,18,.22);}
.modal-title{font-weight:700;font-size:15px;margin-bottom:14px;color:var(--txt);padding-bottom:10px;border-bottom:1px solid var(--bdr2)}

.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt3);padding:3px 8px;}
.month-nav button:hover{color:var(--br7)}
.month-nav span{font-size:15px;font-weight:700;color:var(--txt);min-width:100px;text-align:center}

.view-toggle{display:flex;border:1px solid var(--bdr);border-radius:var(--r6);overflow:hidden}
.view-toggle button{flex:1;padding:5px 12px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--txt3);}
.view-toggle button.active{background:var(--br7);color:#fff}

.legend-section{margin-top:14px;border:1px solid var(--bdr);border-radius:var(--r10);overflow:hidden;}
.legend-toggle{width:100%;padding:10px 14px;background:#F7F2EA;border:none;cursor:pointer;text-align:left;font-size:12px;font-weight:600;color:var(--txt2);display:flex;justify-content:space-between;align-items:center;}
.legend-grid{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;background:#FDFAF6}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}

.field-wrap{margin-bottom:12px}
.field-label{font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:600}

@media print{
  .app-header,.tabs,.btn,.view-toggle,.month-nav button,.legend-section,.warn-box{display:none !important}
  .tbl-wrap{overflow:visible !important;border:none !important;box-shadow:none !important}
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ─── 구글 Firebase 설정 영역 ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  databaseURL: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};

let database = null;
try {
  if (firebaseConfig.databaseURL && firebaseConfig.databaseURL.trim() !== "") {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
  }
} catch (e) { console.error("Firebase 로드 실패, 로컬 모드로 전환합니다.", e); }

// ─── 데이터 정의 ─────────────────────────────────
const SHIFTS={
  'O':'O (10:30~20:30)','M':'M (11:00~21:00)','C':'C (11:30~21:30)',
  'HO':'홀오픈 (10:45~20:45)','HC':'홀마감 (11:30~21:30)',
  'FM':'풀오마 (전일)','&&':'&& (사장전일)','DO':'D/O (휴무)','YC':'연차','KH':'경조휴가','TH':'훈련'
};
const SHIFT_CSS={O:'shift-O',M:'shift-M',C:'shift-C',HO:'shift-HO',HC:'shift-HC',FM:'shift-FM','&&':'shift-PP',DO:'shift-DO',YC:'shift-YC',KH:'shift-KH',TH:'shift-TH'};
const DAYS_KR=['일','월','화','수','목','금','토'];

const defaultEmployees=[
  {id:1,name:'신주민',role:'manager',position:'hall',level:'A',prefShifts:['HC','HO','C'],fixedOff:[],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:2,name:'권현석',role:'staff',position:'kitchen',level:'B',prefShifts:['C','O'],fixedOff:[3],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:3,name:'윤재훈',role:'staff',position:'kitchen',level:'A',prefShifts:['C','M','HO'],fixedOff:[1],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:4,name:'이희명',role:'staff',position:'kitchen',level:'B',prefShifts:['M','C'],fixedOff:[],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:5,name:'김시문',role:'staff',position:'hall',level:'B',prefShifts:['HO','HC'],fixedOff:[],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:6,name:'이도경',role:'staff',position:'hall',level:'C',prefShifts:['O'],fixedOff:[2],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:7,name:'윤용상',role:'staff',position:'kitchen',level:'C',prefShifts:['C','M'],fixedOff:[],workDays:5,weekend:false,boss:false,annualLeaveTotal:15},
  {id:8,name:'정지원',role:'staff',position:'hall',level:'A',fixedOff:[1,2,3,4,5],workDays:2,weekend:true,boss:false,annualLeaveTotal:11},
  {id:9,name:'이태희',role:'boss',position:'kitchen',level:'A',prefShifts:['&&'],fixedOff:[0,6],workDays:11,weekend:false,boss:true,annualLeaveTotal:0},
  {id:10,name:'박재영',role:'boss',position:'hall',level:'A',prefShifts:['&&'],fixedOff:[0,6],workDays:11,weekend:false,boss:true,annualLeaveTotal:0},
];

const defaultLeaveUsedPrior={1:13,2:12,3:4,4:14,5:15,6:15,7:15,8:11,9:0,10:0};
const TODAY=new Date();

let state={
  tab:0,view:'table',
  year:TODAY.getFullYear(),month:TODAY.getMonth(),
  employees:JSON.parse(JSON.stringify(defaultEmployees)),
  schedule:{},annualLeave:{},warnings:[],
  modal:null,nextId:11,filterEmpId:null,legendOpen:false,
  annualLeaveUsedPrior:JSON.parse(JSON.stringify(defaultLeaveUsedPrior)),
  passwordHash:null, isLocked:false, _unlocked:false,
};

function pushStateToServer(){
  if(!database) { saveStateToLocal(); return; }
  database.ref('memealzip_schedule_data').set({
    schedule: state.schedule,
    employees: state.employees,
    annualLeave: state.annualLeave,
    passwordHash: state.passwordHash,
    isLocked: state.isLocked
  });
}

function listenServerChanges(){
  if(!database) { loadStateFromLocal(); return; }
  database.ref('memealzip_schedule_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
      if(data.schedule) state.schedule = data.schedule;
      if(data.employees) state.employees = data.employees;
      if(data.annualLeave) state.annualLeave = data.annualLeave;
      if(data.passwordHash) state.passwordHash = data.passwordHash;
      state.isLocked = !!data.isLocked;
      validateSchedule();
      render();
    }
  });
}

function saveStateToLocal(){
  try{ localStorage.setItem('memealzip_v1',JSON.stringify(state)); }catch(e){}
}
function loadStateFromLocal(){
  try{
    const s=localStorage.getItem('memealzip_v1'); if(!s) return;
    const p=JSON.parse(s);
    if(p.schedule
